<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Codevera Blog — Tutorials, product guides, and engineering insights.">
  <title>Blog — Codevera Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar"></nav>

<!-- Page Hero -->
<section class="page-hero">
  <div class="container">
    <div class="section-tag">Blog</div>
    <h1>From the Workshop</h1>
    <p>Tutorials, deep dives, and product updates from the Codevera team.</p>
  </div>
</section>

<!-- Blog Grid -->
<section class="section-pad">
  <div class="container">
    <div id="blog-grid" class="blog-grid"></div>
  </div>
</section>

<!-- Newsletter / CTA -->
<div class="cta-band">
  <div class="container" style="position:relative;z-index:1">
    <h2>Stay in the Loop</h2>
    <p>New posts on WordPress, SaaS, and web development — straight to your inbox.</p>
    <form style="display:flex;gap:12px;justify-content:center;max-width:480px;margin:0 auto"
          onsubmit="event.preventDefault();alert('Thanks! We\'ll be in touch.')">
      <input type="email" placeholder="your@email.com" required
             style="flex:1;padding:14px 18px;border-radius:var(--r-md);border:none;font-family:var(--f-body);font-size:14px">
      <button type="submit" class="btn btn-white">Subscribe</button>
    </form>
  </div>
</div>

<div id="whatsapp-float"></div>
<footer id="site-footer"></footer>

<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>
</body>
</html>
